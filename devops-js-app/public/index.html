<!DOCTYPE html>
<html>
<head>
  <title>DevOps App</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .container {
      padding: 30px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .logo {
      display: grid;
      grid-template-columns: repeat(6, 10px);
      gap: 6px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #00ffcc;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">
      <!-- Dot Logo -->
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>

      <div class="dot"></div><div></div><div></div>
      <div></div><div></div><div class="dot"></div>

      <div class="dot"></div><div></div><div class="dot"></div>
      <div class="dot"></div><div></div><div class="dot"></div>

      <div class="dot"></div><div></div><div></div>
      <div></div><div></div><div class="dot"></div>

      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <h1>Hello DevOps Engineer 🚀</h1>
    <p>Containerized with Docker | Ready for CI/CD</p>
  </div>

</body>
</html>
